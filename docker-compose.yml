services:
  wyrmhole:
    image: ghcr.io/eagleffz/wyrmhole:main
    build: .
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - wyrmhole-data:/data
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/settings"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  wyrmhole-data:
